name: Blog content integrity

# TokyoKorean — essay / lived-experience blog (not GSF-Ark investment fact sheets).
# Sources in frontmatter are optional; when present, schema still enforces URL quality.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "src/data/blog/**/*.md"

jobs:
  astro-check-essay:
    name: Astro check (TokyoKorean essay mode)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Schema check (optional sources)
        env:
          CONTENT_INTEGRITY_REQUIRE_SOURCES: "false"
          CONTENT_INTEGRITY_MIN_SOURCES: "2"
        run: pnpm exec astro check
