<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="Map of Recommended Kids Museums in Tokyo" style="max-width:100%;height:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;margin: 20px 0;">
  <text x="24" y="35" font-size="16" font-weight="700" fill="#111827">Tokyo Edutainment Hubs (2026)</text>
  
  <!-- Ueno (National Science) -->
  <circle cx="450" cy="80" r="40" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
  <text x="450" y="85" font-size="12" font-weight="700" fill="#166534" text-anchor="middle">Ueno</text>
  <text x="450" y="105" font-size="10" fill="#15803d" text-anchor="middle">Nat. Museum of Science</text>
  
  <!-- Azabudai (teamLab) -->
  <circle cx="350" cy="180" r="45" fill="#fef2f2" stroke="#f87171" stroke-width="2" />
  <text x="350" y="185" font-size="12" font-weight="700" fill="#991b1b" text-anchor="middle">Azabudai</text>
  <text x="350" y="205" font-size="10" fill="#b91c1c" text-anchor="middle">teamLab Borderless</text>
  
  <!-- Toyosu (KidZania) -->
  <circle cx="550" cy="220" r="40" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" />
  <text x="550" y="225" font-size="12" font-weight="700" fill="#0369a1" text-anchor="middle">Toyosu</text>
  <text x="550" y="245" font-size="10" fill="#075985" text-anchor="middle">KidZania</text>
  
  <!-- Odaiba (Miraikan) -->
  <circle cx="480" cy="260" r="35" fill="#faf5ff" stroke="#a855f7" stroke-width="2" />
  <text x="480" y="265" font-size="12" font-weight="700" fill="#6b21a8" text-anchor="middle">Odaiba</text>
  <text x="480" y="285" font-size="10" fill="#7e22ce" text-anchor="middle">Miraikan</text>
  
  <!-- Mitaka (Ghibli) -->
  <circle cx="150" cy="150" r="40" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" />
  <text x="150" y="155" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">Mitaka</text>
  <text x="150" y="175" font-size="10" fill="#b45309" text-anchor="middle">Ghibli Museum</text>
</svg>