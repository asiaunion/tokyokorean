<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-label="Tokyo Korean Community Map 2026" style="max-width:100%;height:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;margin: 20px 0;">
  <text x="24" y="35" font-size="16" font-weight="700" fill="#111827">Key Korean Hubs in Tokyo by Characteristics (2026)</text>
  
  <!-- Shin-Okubo -->
  <circle cx="150" cy="150" r="60" fill="#fef2f2" stroke="#f87171" stroke-width="2" />
  <text x="150" y="145" font-size="14" font-weight="700" fill="#991b1b" text-anchor="middle">Shin-Okubo</text>
  <text x="150" y="165" font-size="11" fill="#b91c1c" text-anchor="middle">Culture/Gastro/Tourism</text>
  
  <!-- Azabu -->
  <circle cx="380" cy="150" r="70" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" />
  <text x="380" y="145" font-size="14" font-weight="700" fill="#0369a1" text-anchor="middle">Azabu/Hiroo</text>
  <text x="380" y="165" font-size="11" fill="#075985" text-anchor="middle">Global Business/Wealth</text>
  
  <!-- Toranomon -->
  <circle cx="610" cy="150" r="60" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
  <text x="610" y="145" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">Toranomon/Roppongi</text>
  <text x="610" y="165" font-size="11" fill="#15803d" text-anchor="middle">IT/Startup/Fintech</text>
  
  <!-- Connections -->
  <path d="M210 150 L310 150" stroke="#94a3b8" stroke-dasharray="4,4" />
  <path d="M450 150 L550 150" stroke="#94a3b8" stroke-dasharray="4,4" />
</svg>