<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="한일 크로스보더 상속세 과세 체계" style="max-width:100%;height:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;margin: 20px 0;">
  <text x="24" y="35" font-size="16" font-weight="700" fill="#111827">거주 상태별 일본 내 상속·증여세 과세 범위</text>
  
  <!-- Japan Asset Section -->
  <rect x="60" y="80" width="300" height="120" fill="#fef2f2" stroke="#f87171" stroke-width="1" rx="8" />
  <text x="165" y="110" font-size="14" font-weight="700" fill="#991b1b">일본 내 자산</text>
  <text x="100" y="145" font-size="12" fill="#b91c1c">● 모든 체류자 과세</text>
  <text x="100" y="170" font-size="12" fill="#b91c1c">● 비거주자 투자자 포함</text>
  
  <!-- Global Asset Section -->
  <rect x="400" y="80" width="300" height="120" fill="#eff6ff" stroke="#60a5fa" stroke-width="1" rx="8" />
  <text x="495" y="110" font-size="14" font-weight="700" fill="#1e40af">해외(한국 등) 자산</text>
  <text x="420" y="145" font-size="12" fill="#1d4ed8">● 일본 10년 이상 거주자 과세</text>
  <text x="420" y="170" font-size="12" fill="#1d4ed8">● 영주권자 / 배우자 비자 과세</text>
  
  <!-- Connection Arrow -->
  <path d="M360 140 L400 140" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
    </marker>
  </defs>
  <text x="345" y="225" font-size="11" fill="#6b7280" text-anchor="middle">10년 거주 또는 영주권 취득 시 과세 범위 확장</text>
</svg>