<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="Japan Permanent Residency Timeline Chart" style="max-width:100%;height:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;margin: 20px 0;">
  <text x="24" y="35" font-size="16" font-weight="700" fill="#111827">Routes to Japan Permanent Residency (2026)</text>
  
  <!-- General Route -->
  <rect x="60" y="80" width="640" height="40" fill="#f9fafb" stroke="#e5e7eb" rx="4" />
  <rect x="60" y="80" width="640" height="40" fill="#9ca3af" opacity="0.2" />
  <text x="75" y="105" font-size="12" fill="#374151">General Work Visa Route</text>
  <text x="630" y="105" font-size="12" font-weight="700" fill="#111827">10 Years</text>
  
  <!-- HSP 70 Points -->
  <rect x="60" y="135" width="200" height="40" fill="#dbeafe" stroke="#3b82f6" rx="4" />
  <text x="75" y="160" font-size="12" fill="#1e40af">HSP (70+ Points)</text>
  <text x="200" y="160" font-size="12" font-weight="700" fill="#1e40af">3 Years</text>
  
  <!-- HSP 80 Points -->
  <rect x="60" y="190" width="80" height="40" fill="#dcfce7" stroke="#22c55e" rx="4" />
  <text x="75" y="215" font-size="12" fill="#166534">HSP (80+ Points)</text>
  <text x="110" y="215" font-size="12" font-weight="700" fill="#166534">1 Year</text>
  
  <!-- Labels -->
  <line x1="60" y1="65" x2="700" y2="65" stroke="#e5e7eb" stroke-width="1" />
  <text x="60" y="55" font-size="10" fill="#9ca3af">Start</text>
  <text x="700" y="55" font-size="10" fill="#9ca3af" text-anchor="end">PR Eligibility</text>
</svg>