<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="築地・豊洲 連係動線ガイド" style="max-width:100%;height:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;margin: 20px 0;">
  <text x="24" y="35" font-size="16" font-weight="700" fill="#111827">築地＆豊洲 モーニングツアー (2026)</text>
  
  <!-- Tsukiji -->
  <rect x="60" y="70" width="180" height="100" fill="#f8fafc" stroke="#64748b" rx="8" />
  <text x="150" y="100" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">AM 08:30 築地</text>
  <text x="150" y="125" font-size="11" fill="#475569" text-anchor="middle">場外市場で食べ歩き</text>
  <text x="150" y="145" font-size="11" fill="#475569" text-anchor="middle">再開発現場を視察</text>
  
  <!-- Transport -->
  <path d="M240 120 L320 120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="280" y="110" font-size="10" fill="#94a3b8" text-anchor="middle">バス・タクシー10分</text>
  
  <!-- Toyosu -->
  <rect x="320" y="70" width="180" height="100" fill="#f0f9ff" stroke="#0ea5e9" rx="8" />
  <text x="410" y="100" font-size="12" font-weight="700" fill="#0369a1" text-anchor="middle">AM 10:30 豊洲</text>
  <text x="410" y="125" font-size="11" fill="#075985" text-anchor="middle">千客万来で美食探訪</text>
  <text x="410" y="145" font-size="11" fill="#075985" text-anchor="middle">市場見学ギャラリー</text>
  
  <!-- Onsen -->
  <path d="M500 120 L580 120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="580" y="70" width="120" height="100" fill="#fef2f2" stroke="#f87171" rx="8" />
  <text x="640" y="100" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">PM 01:00 温泉</text>
  <text x="640" y="130" font-size="11" fill="#991b1b" text-anchor="middle">万葉倶楽部で足湯</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>