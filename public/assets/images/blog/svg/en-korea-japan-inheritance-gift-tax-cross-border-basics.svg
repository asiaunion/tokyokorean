<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="Japan Cross-Border Tax Liability Map" style="max-width:100%;height:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;margin: 20px 0;">
  <text x="24" y="35" font-size="16" font-weight="700" fill="#111827">Japan Inheritance Tax Scope by Residency</text>
  
  <!-- Japan Asset Section -->
  <rect x="60" y="80" width="300" height="120" fill="#fef2f2" stroke="#f87171" stroke-width="1" rx="8" />
  <text x="165" y="110" font-size="14" font-weight="700" fill="#991b1b">Assets in Japan</text>
  <text x="100" y="145" font-size="12" fill="#b91c1c">● Taxable for ALL residents</text>
  <text x="100" y="170" font-size="12" fill="#b91c1c">● Includes non-resident investors</text>
  
  <!-- Global Asset Section -->
  <rect x="400" y="80" width="300" height="120" fill="#eff6ff" stroke="#60a5fa" stroke-width="1" rx="8" />
  <text x="495" y="110" font-size="14" font-weight="700" fill="#1e40af">Global Assets (Korea, etc.)</text>
  <text x="420" y="145" font-size="12" fill="#1d4ed8">● Taxable if resident &gt; 10 years</text>
  <text x="420" y="170" font-size="12" fill="#1d4ed8">● Taxable for PR/Spouse visa holders</text>
  
  <!-- Connection Arrow -->
  <path d="M360 140 L400 140" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
    </marker>
  </defs>
  <text x="345" y="225" font-size="11" fill="#6b7280" text-anchor="middle">Scope expands after 10 years or PR status</text>
</svg>